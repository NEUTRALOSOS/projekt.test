<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>AINotePad</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', sans-serif;
        background: #0f172a;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        width: 100%;
        max-width: 600px;
        height: 90vh;
        background: #1e293b;
        display: flex;
        flex-direction: column;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .header {
        background: #020617;
        color: #38bdf8;
        padding: 15px;
        text-align: center;
        font-size: 1.1em;
        font-weight: bold;
        border-bottom: 1px solid #334155;
    }

    #chat {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .m {
        padding: 10px 12px;
        border-radius: 12px;
        max-width: 80%;
        word-wrap: break-word;
        font-size: 0.95em;
    }

    .u {
        align-self: flex-end;
        background: #0ea5e9;
        color: white;
    }

    .a {
        align-self: flex-start;
        background: #334155;
        color: #e2e8f0;
        font-style: italic;
    }

    .info {
        font-size: 0.7em;
        opacity: 0.7;
        display: block;
        margin-bottom: 4px;
    }

    .controls {
        padding: 10px;
        display: flex;
        gap: 8px;
        background: #020617;
        border-top: 1px solid #334155;
    }

    input {
        padding: 10px;
        border-radius: 8px;
        border: none;
        background: #1e293b;
        color: white;
        outline: none;
    }

    input::placeholder {
        color: #94a3b8;
    }

    button {
        padding: 10px 15px;
        background: #0ea5e9;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #0284c7;
    }

    /* 📱 Mobilní optimalizace */
    @media (max-width: 600px) {
        .container {
            height: 100vh;
            border-radius: 0;
        }

        .controls {
            flex-direction: column;
        }

        #nick {
            width: 100% !important;
        }

        button {
            width: 100%;
        }
    }
</style>
</head>

<body>

<div class="container">
    <div class="header">ENotePad: MartinHavlicek.skola.test</div>

    <div id="chat"></div>

    <div class="controls">
        <input type="text" id="nick" placeholder="Přezdívka" style="width: 100px;">
        <input type="text" id="msg" placeholder="Zpráva (použij !ai ...)" style="flex: 1;"
               onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">Odeslat</button>
    </div>
</div>

<script>
    let msgCount = 0;

    async function send() {
        const nick = document.getElementById('nick').value || "Host";
        const input = document.getElementById('msg');

        if (!input.value.trim()) return;

        await fetch('/send_message', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ user: nick, text: input.value })
        });

        input.value = '';
        update();
    }

    async function update() {
        const r = await fetch('/get_messages');
        const data = await r.json();
        const box = document.getElementById('chat');

        if (data.length !== msgCount) {
            box.innerHTML = '';

            data.forEach(m => {
                const cls = m.user.includes('AI') ? 'a' : 'u';
                box.innerHTML += `
                    <div class="m ${cls}">
                        <span class="info">${m.user} (${m.time})</span>
                        ${m.text}
                    </div>
                `;
            });

            box.scrollTop = box.scrollHeight;
            msgCount = data.length;
        }
    }

    setInterval(update, 2000);
    update();
</script>

</body>
</html>
